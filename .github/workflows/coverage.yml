name: Coverage

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install latest npm (>= 11.5.1)
        shell: bash
        run: |
          REQUIRED=11.5.1
          if [ "$(printf '%s\n' "$REQUIRED" "$(npm -v)" | sort -V | head -n1)" = "$REQUIRED" ]; then
            echo "npm $(npm -v) is up-to-date (>= $REQUIRED)"
            exit 0
          fi
          # Use a user-writable prefix so this works in PRs from forks where
          # the default global prefix may be read-only. Prepend its bin dir to
          # PATH via $GITHUB_PATH so subsequent steps pick up the new npm.
          NPM_PREFIX="$RUNNER_TEMP/npm-global"
          mkdir -p "$NPM_PREFIX"
          npm install --prefix "$NPM_PREFIX" -g "npm@$REQUIRED"
          # On Linux/macOS npm puts binaries into $prefix/bin, on Windows
          # directly into $prefix (as npm.cmd). Pick whichever exists.
          if [ -x "$NPM_PREFIX/bin/npm" ] || [ -x "$NPM_PREFIX/bin/npm.cmd" ]; then
            NPM_BIN_DIR="$NPM_PREFIX/bin"
          else
            NPM_BIN_DIR="$NPM_PREFIX"
          fi
          echo "$NPM_BIN_DIR" >> "$GITHUB_PATH"
          "$NPM_BIN_DIR"/npm -v 2>/dev/null || "$NPM_BIN_DIR"/npm.cmd -v

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: coverage-run
        run: |
          if node -e "const s=require('./package.json').scripts; process.exit(s && s['test:coverage'] ? 0 : 1)"; then
            npm run test:coverage
            echo "ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "test:coverage script not found, skipping."
            echo "ran=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage artifact
        if: success() && steps.coverage-run.outputs.ran == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: SonarCloud Scan
        if: success() && steps.coverage-run.outputs.ran == 'true'
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
