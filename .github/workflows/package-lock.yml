# To modify this workflow, edit it in diplodoc/devops/lint/scaffolding/.github/workflows/
# and then run the scaffolding update process.

name: Update package-lock.json

on:
  pull_request:
    branches: ['**']

permissions:
  contents: write

jobs:
  update-package-lock:
    name: Update package-lock.json
    runs-on: ubuntu-latest
    # Skip for PRs from forks: the bot token isn't available in fork context
    # (actions/checkout fails with "Input required: token"), and we couldn't
    # push back into the fork's branch anyway.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install latest npm (>= 11.5.1)
        shell: bash
        run: |
          REQUIRED=11.5.1
          if [ "$(printf '%s\n' "$REQUIRED" "$(npm -v)" | sort -V | head -n1)" = "$REQUIRED" ]; then
            echo "npm $(npm -v) is up-to-date (>= $REQUIRED)"
            exit 0
          fi
          # Use a user-writable prefix so this works in PRs from forks where
          # the default global prefix may be read-only. Prepend its bin dir to
          # PATH via $GITHUB_PATH so subsequent steps pick up the new npm.
          NPM_PREFIX="$RUNNER_TEMP/npm-global"
          mkdir -p "$NPM_PREFIX"
          npm install --prefix "$NPM_PREFIX" -g "npm@$REQUIRED"
          # On Linux/macOS npm puts binaries into $prefix/bin, on Windows
          # directly into $prefix (as npm.cmd). Pick whichever exists.
          if [ -x "$NPM_PREFIX/bin/npm" ] || [ -x "$NPM_PREFIX/bin/npm.cmd" ]; then
            NPM_BIN_DIR="$NPM_PREFIX/bin"
          else
            NPM_BIN_DIR="$NPM_PREFIX"
          fi
          echo "$NPM_BIN_DIR" >> "$GITHUB_PATH"
          "$NPM_BIN_DIR"/npm -v 2>/dev/null || "$NPM_BIN_DIR"/npm.cmd -v

      - name: Regenerate package-lock.json
        run: npm install --no-workspaces --package-lock-only --ignore-scripts

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -e

          # Check if there are any changes
          if [[ -z $(git diff --stat | grep package-lock.json) ]]; then
            echo "::info::Nothing to update"
            exit 0
          fi

          # Configure git
          git config --global user.email "95919151+yc-ui-bot@users.noreply.github.com"
          git config --global user.name "yc-ui-bot"

          # Commit and push
          git add package-lock.json
          git commit -m "chore: Update package-lock.json" --no-verify
          git push origin HEAD:${BRANCH_NAME}
