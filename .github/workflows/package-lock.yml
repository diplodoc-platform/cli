# and then run the scaffolding update process.

name: Update package-lock.json

on:
  pull_request:
    branches: ['**']

permissions:
  contents: write

jobs:
  update-package-lock:
    name: Update package-lock.json
    runs-on: ubuntu-latest
    # Skip for PRs from forks: the bot token isn't available in fork context
    # (actions/checkout fails with "Input required: token"), and we couldn't
    # push back into the fork's branch anyway.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: diplodoc-platform/setup-node-action@v1
        with:
          node-version: ${{ vars.NODE_VERSION || '24' }}
          registry-url: 'https://registry.npmjs.org'
          run-install: 'false'

      - name: Regenerate package-lock.json
        run: npm install --no-workspaces --package-lock-only --ignore-scripts

      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -e

          # Check if there are any changes
          if [[ -z $(git diff --stat | grep package-lock.json) ]]; then
            echo "::info::Nothing to update"
            exit 0
          fi

          # Configure git
          git config --global user.email "95919151+yc-ui-bot@users.noreply.github.com"
          git config --global user.name "yc-ui-bot"

          git add package-lock.json
          git fetch origin "${BRANCH_NAME}"
          REMOTE_TIP="$(git rev-parse "origin/${BRANCH_NAME}")"

          git commit --amend --no-edit --no-verify
          if git push --force-with-lease origin "HEAD:${BRANCH_NAME}"; then
            echo "::notice::Pushed amended lockfile commit on ${BRANCH_NAME}"
          else
            echo "::warning::Force-push failed, falling back to a regular commit"
            git reset --soft "${REMOTE_TIP}"
            git commit -m "chore: Update package-lock.json" --no-verify
            git push origin "HEAD:${BRANCH_NAME}"
          fi
