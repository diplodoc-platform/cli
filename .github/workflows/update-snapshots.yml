name: Update E2E Snapshots

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to update snapshots for'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install latest npm (>= 11.5.1)
        run: |
          [ "$(printf '%s\n' "11.5.1" "$(npm -v)" | sort -V | head -n1)" = "11.5.1" ] || npm install -g npm@latest
        shell: bash

      - name: Fetch PR information
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}
        run: |
          set -e

          PR_NUMBER="${{ inputs.pr_number }}"

          # Get PR details
          PR_DATA=$(gh pr view $PR_NUMBER --json headRefName,baseRefName,title,author)

          BRANCH_NAME=$(echo "$PR_DATA" | jq -r '.headRefName')
          BASE_BRANCH=$(echo "$PR_DATA" | jq -r '.baseRefName')
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT

          echo "::notice::Processing PR #$PR_NUMBER: $PR_TITLE (branch: $BRANCH_NAME)"

      - name: Checkout PR branch
        run: |
          git fetch origin ${{ steps.pr_info.outputs.branch_name }}
          git checkout ${{ steps.pr_info.outputs.branch_name }}

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Update e2e snapshots
        working-directory: tests
        run: npm run test:update

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [[ -n $(git diff --stat | grep -E "snapshots|__snapshots__") ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::Snapshot changes detected"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "::notice::No snapshot changes detected"
          fi

      - name: Commit and push snapshot updates
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}
        run: |
          set -e

          # Configure git
          git config user.email "95919151+yc-ui-bot@users.noreply.github.com"
          git config user.name "yc-ui-bot"

          # Add snapshot files
          git add tests/**/__snapshots__/

          # Commit changes
          git commit -m "test: update e2e snapshots" --no-verify

          # Push to PR branch
          git push origin ${{ steps.pr_info.outputs.branch_name }}

          echo "::notice::Snapshots updated and pushed to branch ${{ steps.pr_info.outputs.branch_name }}"

      - name: Comment on PR
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ inputs.pr_number }} \
            --body "✅ E2E snapshots have been updated automatically by @yc-ui-bot" \
            --repo ${{ github.repository }}
