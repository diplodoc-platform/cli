# ⚠️ IMPORTANT: This workflow is a template from diplodoc/infra/scaffolding
# Do not edit this file in other packages - it is automatically copied from here.
# To modify this workflow, edit it in diplodoc/devops/infra/scaffolding/.github/workflows/
# and then run the scaffolding update process.

# Auto-approves automated bot PRs with the machine user `diplodoc-bot` so they
# satisfy required_approving_review_count / require_code_owner_review without a
# human. Only two kinds of bot PRs qualify (see scripts/match-auto-approve.js in
# @diplodoc/infra — keep the conditions below in sync with it):
#   - dependency updates from update-deps.yml (branch ci/update-deps/*)
#   - release PRs from release-please.yml      (branch release-please--*)
#
# The approver (diplodoc-bot via INFRA_APPROVER_PAT) differs from the PR author
# (yc-ui-bot), so GitHub's no-self-approval rule is not violated. This workflow
# only approves; it does NOT enable auto-merge (the CI gate still must pass).
#
# Defense in depth:
#   - The branch name alone is not trusted: before approving we verify EVERY
#     commit on the PR was authored AND committed by yc-ui-bot (mirrors
#     commitsAllAuthoredBy() in scripts/match-auto-approve.js).
#   - On every push (synchronize) any prior bot approval made for an older commit
#     is DISMISSED, so an approval never lingers over unreviewed new code. A fresh
#     approval is only re-issued when the new head is still all-bot content.
#
# To opt a repo out, exclude this file via .infrarc.yml or distribution.yml.

name: Auto-approve bot PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Mirror of scripts/match-auto-approve.js: author must be the dep/release
    # bot and the head branch must match one of the two automated PR shapes.
    # (For fork PRs GitHub does not expose secrets, so HAS_PAT is false and the
    # step below is skipped — fork PRs can never be auto-approved.)
    if: >
      github.event.pull_request.user.login == 'yc-ui-bot' &&
      (startsWith(github.event.pull_request.head.ref, 'ci/update-deps/') ||
       startsWith(github.event.pull_request.head.ref, 'release-please--'))
    env:
      # `secrets` is not available in a step-level `if`; map to a job-level env
      # flag (which can read secrets) so we can skip cleanly when the PAT is unset.
      HAS_PAT: ${{ secrets.INFRA_APPROVER_PAT != '' }}
    steps:
      # Runs as diplodoc-bot (fine-grained PAT, member of @diplodoc-platform/team,
      # scope: Pull requests: Read and write). Skips cleanly if the secret is unset.
      - name: Approve / dismiss via diplodoc-bot machine user
        if: env.HAS_PAT == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_APPROVER_PAT }}
          script: |
            // The only identity whose automated commits we trust to auto-approve.
            const ALLOWED_AUTHOR = 'yc-ui-bot';

            const {owner, repo} = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const headSha = pr.head.sha;
            const prAuthor = pr.user.login;

            // Resolve the approver (this PAT's identity).
            let approver = '';
            try {
              approver = (await github.rest.users.getAuthenticated()).data.login;
            } catch (e) {
              core.warning(`Could not resolve approver identity: ${e.message}`);
              return;
            }
            if (approver === prAuthor) {
              core.notice(`Approver equals PR author (${approver}) — skipping to avoid self-approval.`);
              return;
            }

            // Existing APPROVED reviews left by this approver.
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });
            const botApprovals = reviews.filter(
              (r) => r.user && r.user.login === approver && r.state === 'APPROVED',
            );

            // SECURITY: a new commit must invalidate a prior approval. Dismiss any
            // of our approvals that were made for an older commit than the current
            // head, so the approval never lingers over unreviewed new code.
            for (const r of botApprovals) {
              if (r.commit_id !== headSha) {
                try {
                  await github.rest.pulls.dismissReview({
                    owner, repo, pull_number: prNumber, review_id: r.id,
                    message: 'Dismissed by auto-approve: new commits were pushed; re-review required.',
                  });
                  core.notice(`Dismissed stale approval #${r.id} (was for ${r.commit_id}).`);
                } catch (e) {
                  core.warning(`Could not dismiss review #${r.id}: ${e.message}`);
                }
              }
            }

            // Content check: EVERY commit on the PR must be authored AND committed
            // by the trusted bot (mirrors commitsAllAuthoredBy in
            // scripts/match-auto-approve.js). Otherwise we only dismissed above and
            // stop here — a foreign commit gets no fresh approval.
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: prNumber, per_page: 100,
            });

            // TOCTOU guard: only vouch for the exact head we were triggered for.
            // If commits were pushed between the event and this read, the commit
            // list no longer ends at headSha — bail and let the follow-up
            // `synchronize` run re-evaluate the new head from scratch.
            const listHead = commits.length ? commits[commits.length - 1].sha : null;
            if (listHead !== headSha) {
              core.notice(`Head moved since the event (event=${headSha}, now=${listHead}) — skipping.`);
              return;
            }

            const contentOk =
              commits.length > 0 &&
              commits.every(
                (c) =>
                  c.author && c.committer &&
                  c.author.login === ALLOWED_AUTHOR &&
                  c.committer.login === ALLOWED_AUTHOR,
              );
            if (!contentOk) {
              core.notice(`PR #${prNumber} has commits not authored by ${ALLOWED_AUTHOR} — not approving.`);
              return;
            }

            // Idempotent: skip if we already approved the current head.
            if (botApprovals.some((r) => r.commit_id === headSha)) {
              core.notice(`PR #${prNumber} already approved for current head — nothing to do.`);
              return;
            }

            // Pin the approval to the validated SHA so the review record can never
            // silently apply to a commit we did not inspect.
            await github.rest.pulls.createReview({
              owner, repo, pull_number: prNumber, event: 'APPROVE', commit_id: headSha,
              body: 'Auto-approved by diplodoc-bot (machine user, member of @diplodoc-platform/team) for an automated bot PR (dependency update / release). The change is generated by automation; this approval only satisfies branch-protection review requirements. CI must still pass.',
            });
            core.notice(`Approved PR #${prNumber} for ${headSha}.`);
