        $ref: '#/definitions/LogLevel'
      MD032:
        $ref: '#/definitions/LogLevel'
      MD033:
        $ref: '#/definitions/LogLevel'
      MD034:
        $ref: '#/definitions/LogLevel'
      MD035:
        $ref: '#/definitions/LogLevel'
      MD036:
        $ref: '#/definitions/LogLevel'
      MD037:
        $ref: '#/definitions/LogLevel'
