        $ref: '#/definitions/LogLevel'
      MD048:
        $ref: '#/definitions/LogLevel'
      # ── YFM rules (YFM001–YFM017) ───────────────────────────────────
      YFM001:
        $ref: '#/definitions/LogLevel'
      YFM002:
        $ref: '#/definitions/LogLevel'
      YFM003:
        $ref: '#/definitions/LogLevel'
