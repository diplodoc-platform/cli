title: YFM lint configuration file schema (.yfmlint)
type: object
properties:
  default:
    type: boolean
    description: Default state for all rules. false disables all unless overridden.

  log-levels:
    type: object
    description: >
      Log levels per rule. Merged into the main config before processing.
      Values: error, warn, info, disabled.
    properties:
      # ── Markdownlint rules (MD001–MD048) ─────────────────────────────
      MD001:
        $ref: '#/definitions/LogLevel'
      MD002:
        $ref: '#/definitions/LogLevel'
      MD003:
