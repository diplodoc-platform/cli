title: Diplodoc configuration file schema (.yfm)
type: object
properties:
  # ── Global options ─────────────────────────────────────────────────
  input:
    type: string
    description: Path to input directory with documentation sources.

  output:
    type: string
    description: Path to output directory for build artifacts.

  quiet:
    type: boolean
    description: Suppress stdout logs.

  strict:
    type: boolean
    description: Exit with non-zero code on errors or warnings.

  jobs:
    type: integer
    minimum: 0
    description: >
      Number of parallel worker threads.
      0 means single-threaded, omitted value uses cpus-1.

  workerMaxOldSpace:
    type: integer
    minimum: 0
    description: Max old space size for worker threads in megabytes.

  config:
    type: string
    description: Path to an alternative config file.

  copyOnWrite:
    type: boolean
    description: Use COPYFILE_FICLONE flag for file copying.

  originAsInput:
    type: boolean
    description: Allow modifying the input directory in-place.

  # ── Language ───────────────────────────────────────────────────────
  lang:
    type: string
    description: Default language code.

  langs:
    type: array
    items:
      $ref: '#/definitions/LangItem'
    description: >
      Languages supported by the documentation project.
      Each item is a language code string or an extended object.

  # ── Build core ─────────────────────────────────────────────────────
  outputFormat:
    type: string
    enum: ['html', 'md']
    description: >
      Output format.
      html — render to static HTML.
      md — render to enriched Markdown with metadata.

  varsPreset:
    type: string
    description: >
      Name of the variables preset from presets.yaml.
      Merged with the "default" section.

  vars:
    type: object
    description: >
      Template variables passed directly to the build.
      Overrides matching keys from presets.yaml.

  allowHTML:
    type: boolean
    description: Allow raw HTML inside Markdown files (legacy alias for allowHtml).

  allowHtml:
    type: boolean
    description: Allow raw HTML inside Markdown files.

  sanitizeHtml:
    type: boolean
    description: Sanitize transformed HTML output. Slow but more secure.

  sanitizeOptions:
    type: object
    description: Sanitizer configuration options (passed to the HTML sanitizer).
    additionalProperties: true

  linkifyTlds:
    oneOf:
      - type: string
      - type: array
        items:
          type: string
    description: TLD configuration for the linkify plugin.

  ignore:
    type: array
    items:
      type: string
    description: Glob patterns for paths to exclude from processing.

  ignoreStage:
    type: array
    items:
      type: string
      enum: ['new', 'preview', 'tech-preview', 'skip']
    description: TOC stages to exclude from the build.

  staticContent:
    type: boolean
    description: Allow loading custom resources into statically generated pages.

  addSystemMeta:
    type: boolean
    description: Include system variables from presets in file metadata.

  addMapFile:
    type: boolean
    description: Write all documentation paths to file.json.
    deprecated: Use buildManifest instead.

  addAlternateMeta:
    type: boolean
    description: Add alternate and canonical meta tags to pages.

  supportGithubAnchors:
    type: boolean
    description: Use GitHub-compatible heading anchor format.

  # ── Markdown engine ────────────────────────────────────────────────
  breaks:
    type: boolean
    description: Treat single newlines in Markdown as hard line breaks.

  linkify:
    type: boolean
    description: Automatically convert URL-like text to links.

  # ── VCS ────────────────────────────────────────────────────────────
  vcs:
    oneOf:
      - type: boolean
      - type: object
        properties:
          enabled:
            type: boolean
          endpoint:
            type: string
            description: VCS provider API endpoint (from github-vcs / arcadia-vcs).
          owner:
            type: string
            description: Repository owner (from github-vcs).
          repo:
            type: string
            description: Repository name (from github-vcs).
          branch:
            type: string
            description: Default branch (from github-vcs).
          initialCommit:
            type: string
            description: Initial commit SHA for redirect tracking (from github-vcs / arcadia-vcs).
          scopes:
            type: array
            items:
              type: string
            description: VCS scopes (from arcadia-vcs).
        additionalProperties: true
    description: Enable or disable the VCS connector. Object form accepts extension-specific fields.

  vcsToken:
    type: string
    sensitive: true
    description: >
      VCS access token.
      WARNING: Do not store secrets in the config file.
      Use environment variables or CLI arguments instead.

  vcsPath:
    $ref: '#/definitions/Toggleable'
    description: Show the VCS file path in the page header.

  mtimes:
    $ref: '#/definitions/Toggleable'
    description: Collect file modification timestamps from VCS.

  authors:
    oneOf:
      - type: boolean
      - type: object
        properties:
          enabled:
            type: boolean
          ignore:
            type: array
            items:
              type: string
        additionalProperties: false
    description: Collect per-file authors from VCS.

  contributors:
    oneOf:
      - type: boolean
      - type: object
        properties:
          enabled:
            type: boolean
          ignore:
            type: array
            items:
              type: string
        additionalProperties: false
    description: Collect per-file contributors from VCS.

  # ── Templating (Liquid) ───────────────────────────────────────────
  template:
    oneOf:
      - type: boolean
      - $ref: '#/definitions/TemplateConfig'
    description: Configure the Liquid template engine.

  # ── Linter ─────────────────────────────────────────────────────────
  lint:
    oneOf:
      - type: boolean
      - $ref: '#/definitions/LintConfig'
    description: Configure YFM linting during build.

  # ── Extensions ─────────────────────────────────────────────────────
  extensions:
    type: array
    items:
      $ref: '#/definitions/ExtensionItem'
    description: >
      External extensions loaded on startup.
      Each item is a package name or an object with name and options.

  # ── UI interface ───────────────────────────────────────────────────
  interface:
    type: object
    properties:
      toc:
        type: boolean
        description: Show the table of contents sidebar.
      toc-header:
        type: boolean
        description: Show the TOC header section.
      search:
        type: boolean
        description: Show the search input.
      feedback:
        type: boolean
        description: Show feedback controls (likes / dislikes).
      favicon-src:
        type: string
        description: URL to a custom favicon.
    additionalProperties: true
    description: Viewer interface visibility flags.

  feedbackUrl:
    type: string
    format: uri
    description: URL endpoint for feedback submission.

  # ── Custom resources ───────────────────────────────────────────────
  resources:
    $ref: '#/definitions/Resources'
    description: Custom scripts, styles, and CSP directives.

  allowCustomResources:
    type: boolean
    description: Allow loading custom resources in static output mode.

  disableCsp:
    type: boolean
    description: >
      Do not inject Content-Security-Policy meta tags into generated HTML pages.
      Use when CSP is managed externally (e.g. via server HTTP headers).

  # ── Theme ──────────────────────────────────────────────────────────
  theme:
    oneOf:
      - type: string
      - type: 'null'
    description: >
      Override the base brand color or disable theming.
      null disables theme.yaml processing.

  # ── Search ─────────────────────────────────────────────────────────
  search:
    oneOf:
      - type: boolean
      - $ref: '#/definitions/SearchConfig'
    description: Configure the documentation search feature.

  # ── Single page ────────────────────────────────────────────────────
  singlePage:
    type: boolean
    description: Produce a single-page HTML variant for each TOC.

  # ── PDF ────────────────────────────────────────────────────────────
  pdf:
    oneOf:
      - type: boolean
      - type: object
        properties:
          enabled:
            type: boolean
          hiddenPolicy:
            type: boolean
            description: Exclude hidden TOC items from PDF output.
          icon:
            type: string
            description: >
              Custom icon for the PDF download button.
              Accepted values: inline SVG markup, absolute URL,
              or a project-relative path starting with _assets/.
              For md output, paths under _assets/ are copied to the output directory.
          position:
            type: string
            enum: ['toc', 'header']
            description: >
              Where to render the PDF download button.
              toc — below the table of contents (default).
              header — in the page header next to other controls.
          size:
            type: string
            enum: ['S', 'M', 'L']
            description: Size of the PDF download button icon.
          pdfFileUrl:
            type: string
            description: >
              URL or path to the generated PDF file.
              Used only in static HTML builds (outputFormat: html) where the PDF
              download link cannot be resolved automatically.
              In the web viewer this value is computed on the server side.
        additionalProperties: false
    description: Configure PDF output generation.

  pdfDebug:
    type: boolean
    description: Include PDF start pages in the output for debugging.

  # ── Preprocessing ──────────────────────────────────────────────────
  preprocess:
    type: object
    properties:
      hashIncludes:
        type: boolean
      mergeIncludes:
        type: boolean
      mergeAutotitles:
        type: boolean
      mergeSvg:
        type: boolean
      disableMetaMaxLineWidth:
        type: boolean
    additionalProperties: false
    description: Fine-tune Markdown preprocessing for md output format.

  mergeIncludes:
    type: boolean
    description: Merge include contents into parent files (shorthand).

  # ── Content limits ─────────────────────────────────────────────────
  content:
    type: object
    properties:
      maxInlineSvgSize:
        $ref: '#/definitions/FileSize'
        description: Maximum size for inline SVG embedding.
      maxHtmlSize:
        $ref: '#/definitions/FileSize'
        description: Maximum rendered HTML file size.
      maxAssetSize:
        $ref: '#/definitions/FileSize'
        description: Maximum asset file size. 0 disables the check.
      multilineTermDefinitions:
        type: boolean
        description: >
          Allow term definitions to span multiple lines.
          When enabled, a definition continues until the next [*key]: or end of block.
          Default: false.
    additionalProperties: false

  # ── TOC filtering ──────────────────────────────────────────────────
  removeHiddenTocItems:
    type: boolean
    description: Strip hidden items from the table of contents.

  removeEmptyTocItems:
    type: boolean
    description: Strip empty items from the table of contents.

  # ── Misc features ─────────────────────────────────────────────────
  buildManifest:
    type: boolean
    description: Emit yfm-build-manifest.json with all documentation paths.

  crawlerManifest:
    type: boolean
    description: >
      Emit crawler-manifest.json mapping each source file to its external links.
      Useful for link-health checks (detecting 404, 403, etc.).

  changelogs:
    oneOf:
      - type: boolean
      - type: string
    description: Enable changelog generation. String value selects the format.

  watch:
    type: boolean
    description: Enable file-watching mode with incremental rebuilds.

  skipHtmlExtension:
    type: boolean
    description: Remove .html extension from generated links.

  rawAddMeta:
    type: boolean

  addResourcesMeta:
    type: boolean

  addMetadataMeta:
    type: boolean

  analytics:
    $ref: '#/definitions/AnalyticsConfig'

  neuroExpert:
    $ref: '#/definitions/NeuroExpertConfig'
    description: AI expert widget configuration.

  # ── Bug widget ─────────────────────────────────────────────────────
  yabug:
    $ref: '#/definitions/YaBugConfig'
    description: Bug report widget configuration (docs-viewer).

  # ── Feedback widget ─────────────────────────────────────
  yafeedback:
    $ref: '#/definitions/YaFeedbackConfig'
    description: Feedback widget configuration (docs-viewer).

  # ── Viewer preview ─────────────────────────────────────────────────
  docs-viewer:
    $ref: '#/definitions/DocsViewerConfig'
    description: Configuration for the docs-viewer preview server.

  # ── Pages (error/access pages) ────────────────────────────────────
  pages:
    type: object
    properties:
      accessDenied:
        type: object
        additionalProperties: true
      notFound:
        type: object
        additionalProperties: true
      serverError:
        type: object
        additionalProperties: true
    additionalProperties: false
    description: Custom error/access-denied page configuration.

  # ── Query parameters (iframe forwarding) ─────────────────────────
  queryParameters:
    type: object
    properties:
      iframes:
        type: array
        items:
          type: object
          properties:
            domain:
              type: string
            parameters:
              type: array
          additionalProperties: false
    additionalProperties: false
    description: Query parameter forwarding rules for embedded iframes.

  # ── Command scopes ─────────────────────────────────────────────────
  build:
    type: object
    description: >
      Scoped overrides for the build command.
      Accepts the same properties as the root level.

  publish:
    $ref: '#/definitions/PublishConfig'
    description: Configuration for the publish command.

  translate:
    $ref: '#/definitions/TranslateConfig'
    description: Configuration for the translate command.

  # ── Legacy aliases (deprecated) ────────────────────────────────────
  disableLiquid:
    type: boolean
    deprecated: Use template.enabled instead.

  applyPresets:
    type: boolean
    deprecated: Use template.features.substitutions instead.

  resolveConditions:
    type: boolean
    deprecated: Use template.features.conditions instead.

  conditionsInCode:
    type: boolean
    deprecated: Use template.scopes.code instead.

  lintDisabled:
    type: boolean
    deprecated: Use lint.enabled instead.

  needToSanitizeHtml:
    type: boolean
    deprecated: Use sanitizeHtml instead.

additionalProperties: false

# ─── Definitions ──────────────────────────────────────────────────────
definitions:
  LangItem:
    oneOf:
      - type: string
      - type: object
        required: ['lang']
        properties:
          lang:
            type: string
          tld:
            type: string
          href:
            type: string
        additionalProperties: false

  Toggleable:
    oneOf:
      - type: boolean
      - type: object
        properties:
          enabled:
            type: boolean
        additionalProperties: false

  FileSize:
    oneOf:
      - type: string
        pattern: '^\d+[KkMm]?$'
        description: 'Size with optional unit suffix: K (kilobytes), M (megabytes).'
      - type: integer
        minimum: 0
        description: Size in bytes.

  ExtensionItem:
    oneOf:
      - type: string
      - type: object
        required: ['name']
        properties:
          name:
            type: string
        additionalProperties: true

  Resources:
    type: object
    properties:
      script:
        type: array
        items:
          type: string
        description: Paths or URLs to JavaScript files.
      style:
        type: array
        items:
          type: string
        description: Paths or URLs to CSS files.
      csp:
        type: array
        items:
          type: object
        description: >
          Content Security Policy directive overrides.
          Each item is an object mapping a directive name to allowed sources.
    additionalProperties: false

  TemplateConfig:
    type: object
    properties:
      enabled:
        type: boolean
      keepNotVar:
        type: boolean
        description: Keep unresolved variable placeholders instead of removing them.
      legacyConditions:
        type: boolean
        description: Use legacy condition syntax.
      scopes:
        type: object
        properties:
          text:
            type: boolean
            description: Process template expressions in regular text.
          code:
            type: boolean
            description: Process template expressions inside code blocks.
        additionalProperties: false
      features:
        type: object
        properties:
          substitutions:
            type: boolean
            description: Enable variable substitution.
          conditions:
            oneOf:
              - type: boolean
              - type: string
                enum: ['strict']
            description: >
              Enable conditional blocks.
              'strict' mode is used by the translate command.
          cycles:
            type: boolean
            description: Enable loop constructs.
          cicles:
            type: boolean
            description: >
              Alternative spelling of cycles (used in documentation).
              Enable loop constructs.
        additionalProperties: false
    additionalProperties: false

  LintConfig:
    type: object
    properties:
      enabled:
        type: boolean
      config:
        oneOf:
          - type: string
            description: Path to an external .yfmlint config file.
          - type: object
            description: Inline lint rule configuration.
    additionalProperties: false

  SearchConfig:
    type: object
    properties:
      enabled:
        type: boolean
      provider:
        type: string
        enum: ['local', 'algolia']
        description: Search provider identifier (local or algolia).
      appId:
        type: string
        description: Algolia Application ID (provider=algolia).
      apiKey:
        type: string
        sensitive: true
        description: Algolia API Key for indexing (provider=algolia).
      searchApiKey:
        type: string
        description: Client-side Algolia API key for search queries (provider=algolia).
      indexName:
        type: string
        description: Algolia Index Name (provider=algolia).
      index:
        type: boolean
        description: Whether to create and upload the search index (provider=algolia).
      api:
        type: string
        description: Path to the client-side search API script (provider=algolia).
      tolerance:
        type: integer
        minimum: 0
        maximum: 2
        description: >
          Wildcard search tolerance level (provider=local).
          0 — exact match, 1 — trailing wildcard, 2 — leading and trailing.
      confidence:
        type: string
        enum: ['phrased', 'sparsed']
        description: Search scoring strategy (provider=local).
      confidense:
        type: string
        enum: ['phrased', 'sparsed']
        description: >
          Alternative spelling of confidence.
          Search scoring strategy (provider=local).
      indexSettings:
        type: object
        description: >
          Algolia index settings (provider=algolia).
          Passed to Algolia setSettings. Supports searchableAttributes,
          attributesToHighlight, etc.
        additionalProperties: true
      querySettings:
        type: object
        description: >
          Algolia query settings (provider=algolia).
          Merged into each search request. Supports hitsPerPage,
          attributesToRetrieve, etc.
        additionalProperties: true
    additionalProperties: true

  NeuroExpertConfig:
    type: object
    properties:
      projectId:
        type: object
        description: >
          Map of language codes to project IDs.
          Use "default" key for fallback.
      hasOutsideClick:
        type: boolean
      parentId:
        oneOf:
          - type: string
          - type: 'null'
      disabled:
        type: boolean
      customLabel:
        type: object
        description: >
          Map of language codes to custom widget header labels.
          Use "default" key for fallback. Only for whitelisted projects.
        additionalProperties:
          oneOf:
            - type: string
            - type: boolean
      type:
        type: string
        enum: ['widget', 'search']
        description: >
          Widget integration type.
          widget — floating widget initialized on page load.
          search — widget activated via search suggest button.
    additionalProperties: false

  PublishConfig:
    type: object
    properties:
      endpoint:
        type: string
        format: uri
        description: S3-compatible storage endpoint.
      bucket:
        type: string
        description: Target bucket name.
      prefix:
        type: string
        description: Key prefix inside the bucket.
      region:
        type: string
      accessKeyId:
        type: string
        sensitive: true
        description: >
          S3 access key ID.
          WARNING: Do not store secrets in the config file.
      secretAccessKey:
        type: string
        sensitive: true
        description: >
          S3 secret access key.
          WARNING: Do not store secrets in the config file.
      hidden:
        type: array
        items:
          type: string
        description: Glob patterns to exclude from upload.
    additionalProperties: false

  YaBugConfig:
    type: object
    properties:
      disabled:
        type: boolean
        description: Disable the bug report widget.
      form:
        type: string
        description: Custom bug report form URL or path.
    additionalProperties: false

  YaFeedbackConfig:
    type: object
    properties:
      ownerId:
        oneOf:
          - type: string
          - type: object
            description: >
              Map of language codes to owner IDs.
              Use "default" key for fallback.
            additionalProperties:
              type: string
        description: Pythia feedback survey owner ID.
      hideHeader:
        type: boolean
        description: Hide the feedback widget header.
      disabled:
        type: boolean
        description: Disable the feedback widget.
      testIds:
        type: object
        description: Test form IDs for A/B testing.
        additionalProperties: true
    additionalProperties: false

  DocsViewerConfig:
    type: object
    properties:
      project-name:
        type: string
        description: >
          Project URL slug. Lowercase, alphanumeric, hyphens, underscores.
          Max 63 chars. Reserved names: build, docs-assets, api.
      no-index:
        type: boolean
        description: Disallow indexing by external search engines.
      lang:
        type: string
        description: Default language for localization (e.g. "ru").
      langs:
        type: array
        items:
          type: string
        description: Languages shown in the docs UI; first is default.
      favicon-src:
        type: string
        description: Favicon URL for the browser tab.
      logo-options:
        $ref: '#/definitions/LogoOptions'
        description: Logo configuration for the docs viewer.
      metrika:
        oneOf:
          - type: integer
          - type: array
            items:
              type: integer
        description: Yandex Metrika counter ID(s).
      themes:
        type: array
        items:
          type: string
          enum: ['light', 'dark']
        description: Available themes. Server-only.
      gtm:
        type: object
        properties:
          id:
            type: string
            description: Google Tag Manager container ID.
          mode:
            type: string
            enum: ['base', 'notification']
            description: GTM consent mode (base or notification).
        additionalProperties: false
        description: Google Tag Manager settings for the viewer.
      github-url-prefix:
        type: string
        description: Base URL for GitHub source links.
      logo-link-preview:
        type: string
        description: Logo URL for link previews.
      ytm:
        type: object
        properties:
          id:
            type: integer
            description: Yandex Turbo Metrika counter ID.
        additionalProperties: false
        description: Yandex Turbo Metrika configuration.
      pdf:
        type: boolean
        description: Enable the PDF download button in the docs viewer.
      support-widget:
        $ref: '#/definitions/SupportWidgetConfig'
        description: Support chat widget (Yandex Messenger).
      logo-src:
        type: string
        description: Legacy logo URL for light theme (prefer logo-options.src).
      logo-dark-src:
        type: string
        description: Legacy logo URL for dark theme (prefer logo-options.src-dark).
      logo-title:
        type: string
        description: Legacy logo title (prefer logo-options.title).
      uxfb:
        type: object
        properties:
          enabled:
            type: boolean
          id:
            type: string
        additionalProperties: true
        description: UX feedback iframe (Yandex Forms).
      embed:
        type: array
        items:
          type: object
          properties:
            host:
              type: string
        description: Allowed embedding hosts (frame-ancestors).
      index-page:
        type: object
        properties:
          title:
            type: string
          description:
            type: string
          service-url:
            type: string
          hidden:
            type: boolean
        additionalProperties: true
        description: Index page configuration.
      show-toc-header:
        type: boolean
        description: Show the table-of-contents header.
      search-by-toc:
        type: boolean
        description: Enable search by TOC product.
      protected:
        type: boolean
        description: Enable access protection for the project.
      subscription:
        type: object
        properties:
          notifications:
            type: object
            properties:
              type:
                type: string
            additionalProperties: false
        additionalProperties: false
        description: Subscription/notification settings.
      startrek:
        type: object
        additionalProperties: true
        description: Startrek integration settings (internal).
      crawler:
        type: object
        properties:
          exclude:
            type: object
            properties:
              url:
                type: array
                items:
                  type: string
                description: Exact external URLs to exclude from crawler-manifest.json.
              regexp:
                type: array
                items:
                  type: string
                description: >
                  Regular expression patterns (JS /pattern/flags syntax) matching
                  external URLs to exclude from crawler-manifest.json.
            additionalProperties: false
        additionalProperties: false
        description: Crawler-manifest filter settings.
    additionalProperties: true

  LogoOptions:
    type: object
    properties:
      src:
        oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: string
        description: Logo image URL for light theme. Object form maps lang to URL.
      src-dark:
        oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: string
        description: Logo image URL for dark theme.
      src-mobile:
        oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: string
        description: Logo image URL for light theme on mobile.
      src-mobile-dark:
        oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: string
        description: Logo image URL for dark theme on mobile.
      src-preview:
        oneOf:
          - type: string
          - type: object
            additionalProperties:
              type: string
        description: Logo for OpenGraph share preview.
      url:
        type: string
        description: >
          Link target when clicking the logo.
          Supports {lang} placeholder.
      title:
        type: string
        description: Fallback text when logo image is not set.
      img-has:
        type: object
        properties:
          width:
            type: string
            description: Logo width (CSS value).
          offset:
            type: boolean
            description: Apply offset to logo layout.
        additionalProperties: false
        description: Logo layout hints.
    additionalProperties: false

  SupportWidgetConfig:
    type: object
    properties:
      bot-guid:
        type: string
        description: Yandex Messenger bot GUID.
      service-id:
        type: string
        description: Yandex Messenger support service ID.
      disabled:
        type: boolean
        description: Disable the support widget.
    additionalProperties: true

  TranslateConfig:
    type: object
    properties:
      provider:
        type: string
        description: Translation service provider identifier.
      source:
        oneOf:
          - type: string
          - type: object
            properties:
              language:
                type: string
              locale:
                type: string
            required: ['language']
        description: Source language (ISO 639-1 code or {language, locale}).
      target:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: Target language(s) to translate to.
      files:
        type: array
        items:
          type: string
        description: Explicit list of files/filter-lists to translate.
      include:
        type: array
        items:
          type: string
        description: Glob patterns or paths for files to include.
      exclude:
        type: array
        items:
          type: string
        description: Glob patterns or paths for files to exclude.
      vars:
        type: object
        description: Variables passed directly to the translation pipeline.
      dryRun:
        type: boolean
        description: Calculate quota without executing translation.
      useSource:
        type: boolean
        description: Use original text as translation result (debug mode).
      schema:
        type: array
        items:
          type: string
        description: Paths to custom translate schema files.
      filter:
        type: boolean
        description: Only translate files resolved from toc.yaml.
      noRefResolve:
        type: boolean
        description: Disable $ref resolving in OpenAPI during extract.
      folder:
        type: string
        description: Yandex Cloud folder ID (provider-specific).
      glossary:
        type: string
        description: Path to glossary YAML file (provider-specific).
      auth:
        type: string
        sensitive: true
        description: Authorization token for translation API (provider-specific).
    additionalProperties: true

  AnalyticsConfig:
    description: Web analytics configuration (e.g. Google Tag Manager).
    type: object
    properties:
      gtm:
        $ref: '#/definitions/AnalyticsGtmConfig'
      metrika:
        type: array
        items:
          $ref: '#/definitions/AnalyticsMetrikaConfig'
    additionalProperties: true

  AnalyticsGtmConfig:
    type: object
    additionalProperties: false
    properties:
      id:
        type: string
      mode:
        type: string
        enum: [base, notification]

  AnalyticsMetrikaConfig:
    type: object
    additionalProperties: false
    required:
      - id
    properties:
      id:
        type: integer
      params:
        type: object
        additionalProperties: false
        properties:
          accurateTrackBounce:
            type: [boolean, number]
          childIframe:
            type: boolean
          clickmap:
            type: boolean
          defer:
            type: boolean
          ecommerce:
            oneOf:
              - type: boolean
              - type: string
              - type: array
                items:
                  type: string
          trackHash:
            type: boolean
          trackLinks:
            type: boolean
          trustedDomains:
            type: array
            items:
              type: string
          webvisor:
            type: boolean
          triggerEvent:
            type: boolean
          sendTitle:
            type: boolean
          ssr:
            type: boolean
