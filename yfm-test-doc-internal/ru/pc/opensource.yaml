      - type: 'background-card'
        title: 'Yatagan'
        text: 'Фреймворк для внедрения зависимостей, который позволяет ускорить сборку Android‑приложений. Создан на основе Dagger2 API — аналогичного открытого решения от Google. В опенсорсе с 2022 года.'
