meta:
  title: Yandex Open Source | Наши проекты
  description: 'В Яндексе мы разрабатываем и развиваем технологические решения самых разных сфер применения, размеров и сложности. Поэтому и в открытый доступ попадают самые разные проекты — главное, чтобы они приносили пользу не только нам, но и другим.'
  sharing:
    title: Yandex Open Source | Наши проекты
    description: 'В Яндексе мы разрабатываем и развиваем технологические решения самых разных сфер применения, размеров и сложности. Поэтому и в открытый доступ попадают самые разные проекты — главное, чтобы они приносили пользу не только нам, но и другим.'
    image: 'https://storage.yandexcloud.net/yandex-opensource/sharings/yos-share-ru.png'
    keywords:
      - yandex
      - opensource

blocks:
  - type: header-block
    title: "Наши проекты"
    description: 'В Яндексе мы разрабатываем и развиваем технологические решения самых разных сфер применения, размеров и сложности. Поэтому и в открытый доступ попадают самые разные проекты — главное, чтобы они приносили пользу не только нам, но и другим.'
    width: s
    verticalOffset: l
    offset: default
    resetPaddings: true
    breadcrumbs:
      items:
        - url: '/'
          text: 'На главную'
    background:
      fullWidth: false
      image: https://storage.yandexcloud.net/yandex-opensource/pages/projects/yos-projects-cover.png
      color: '#EFF2F8'

  - type: "card-layout-block"
    indent:
      top: 'm'
    title: ''
    description: ''
    colSizes:
      all: 12
      lg: 4
      md: 4
      sm: 12
    anchor:
      url: "projects"
      text: "projects"
    children:

      - type: 'background-card'
        title: 'YDB'
        text: 'Отказоустойчивая распределённая SQL база данных. Позволяет обрабатывать миллионы запросов в секунду и создавать сервисы, способные выдерживать большую операционную нагрузку. В опенсорсе с 2022 года.'
        buttons:
          - text: 'Сайт'
            url: 'https://ydb.tech/ru'
            theme: 'raised'
          - text: 'GitHub'
            url: 'https://github.com/ydb-platform'
            theme: 'outlined-contrast'
        backgroundColor: '#2399FF'
        background:
          src: 'https://storage.yandexcloud.net/yandex-opensource/pages/projects/os-projects-card-ydb.png'
          alt: 'card-background'
        paddingBottom: 'm'
        theme: dark

      - type: 'background-card'
        title: 'YTsaurus'
        text: 'Масштабируемая и отказоустойчивая платформа для распределённого хранения и обработки больших данных. Позволяет выполнять все виды обработки данных, в том числе машинное обучение на GPU. В опенсорсе с 2023 года.'
        buttons:
          - text: 'Сайт'
            url: 'https://ytsaurus.tech/ru'
            theme: 'monochrome'
          - text: 'GitHub'
            url: 'https://github.com/ytsaurus/ytsaurus'
            theme: 'outlined'
        backgroundColor: '#FFB23E'
        background:
          src: 'https://storage.yandexcloud.net/yandex-opensource/pages/projects/os-projects-card-yt.png'
          alt: 'card-background'
        paddingBottom: 'm'
        theme: light

      - type: 'background-card'
        title: 'Gravity UI'
        text: 'Набор библиотек и компонент для создания современных интерфейсов сервисов, лендингов, дашбордов и визуализаций. В опенсорсе с 2023 года.'
        buttons:
          - text: 'Сайт'
            url: 'https://gravity-ui.com/'
            theme: 'raised'
          - text: 'GitHub'
            url: 'https://github.com/gravity-ui'
            theme: 'outlined-contrast'
        backgroundColor: '#262626'
        background:
          src: 'https://storage.yandexcloud.net/yandex-opensource/pages/projects/os-projects-card-gui.png'
          alt: 'card-background'
        paddingBottom: 'm'
        theme: dark

