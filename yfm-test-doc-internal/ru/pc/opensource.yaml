        title: 'DivKit'
        text: 'Фреймворк для создания server‑driven интерфейсов. Позволяет создавать интерфейсы для всех платформ в одном месте и менять их без обновления приложений. В опенсорсе с 2022 года.'
        buttons:
          - text: 'Сайт'
            url: 'https://divkit.tech/ru/'
            theme: 'monochrome'
          - text: 'GitHub'
            url: 'https://github.com/divkit/divkit'
            theme: 'outlined'
        backgroundColor: '#F1F1F1'
        background:
          src: 'https://storage.yandexcloud.net/yandex-opensource/pages/projects/os-projects-card-dk.png'
          alt: 'card-background'
        paddingBottom: 'm'
        theme: light

      - type: 'background-card'
        title: 'Diplodoc'
        text: 'Платформа для написания технической документации в концепции Docs as Code. Использует общепринятый синтаксис Markdown. В опенсорсе с 2023 года.'
        buttons:
