openapi: 3.0.0
info:
  title: Pet Store
  version: v1
servers:
  - url: http://localhost:8080
paths:
  /pets:
    get:
      tags:
        - pets
      summary: List pets
      operationId: listPets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
